name: LongBridge API Probe

on:
  workflow_dispatch:
    inputs:
      qpk_ref:
        description: "QuantPlatformKit ref containing the probe test"
        required: false
        default: "main"
        type: string
      symbol:
        description: "US symbol to use for the probe"
        required: false
        default: "SOXX.US"
        type: string
      limit_price:
        description: "Low buy limit price used by the cancellable probe order"
        required: false
        default: "0.01"
        type: string

env:
  GCP_PROJECT_ID: longbridgequant
  GCP_WORKLOAD_IDENTITY_PROVIDER: projects/252919773759/locations/global/workloadIdentityPools/github-actions/providers/github-main
  GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT: longbridge-platform-deploy@longbridgequant.iam.gserviceaccount.com

jobs:
  hk-fractional-order:
    name: Probe HK Simulated Fractional Orders
    runs-on: ubuntu-latest
    permissions:
      contents: read
      id-token: write
    environment: longbridge-hk
    env:
      CLOUD_RUN_REGION: ${{ vars.CLOUD_RUN_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      LONGPORT_APP_KEY_SECRET_NAME: ${{ vars.LONGPORT_APP_KEY_SECRET_NAME }}
      LONGPORT_APP_SECRET_SECRET_NAME: ${{ vars.LONGPORT_APP_SECRET_SECRET_NAME }}
      LONGPORT_SECRET_NAME: ${{ vars.LONGPORT_SECRET_NAME }}
      LONGPORT_APP_KEY_VALUE: ${{ secrets.LONGPORT_APP_KEY }}
      LONGPORT_APP_SECRET_VALUE: ${{ secrets.LONGPORT_APP_SECRET }}
      LONGPORT_ACCESS_TOKEN_VALUE: ${{ secrets.LONGPORT_ACCESS_TOKEN }}
    steps:
      - name: Validate inputs
        run: |
          set -euo pipefail

          missing_vars=()
          if [ -z "${LONGPORT_APP_KEY_VALUE:-}" ] && [ -z "${LONGPORT_APP_KEY_SECRET_NAME:-}" ]; then
            missing_vars+=("LONGPORT_APP_KEY secret or LONGPORT_APP_KEY_SECRET_NAME variable")
          fi
          if [ -z "${LONGPORT_APP_SECRET_VALUE:-}" ] && [ -z "${LONGPORT_APP_SECRET_SECRET_NAME:-}" ]; then
            missing_vars+=("LONGPORT_APP_SECRET secret or LONGPORT_APP_SECRET_SECRET_NAME variable")
          fi
          if [ -z "${LONGPORT_ACCESS_TOKEN_VALUE:-}" ] && [ -z "${LONGPORT_SECRET_NAME:-}" ]; then
            missing_vars+=("LONGPORT_ACCESS_TOKEN secret or LONGPORT_SECRET_NAME variable")
          fi

          if [ "${#missing_vars[@]}" -gt 0 ]; then
            printf 'Missing longbridge-hk variables:\n' >&2
            printf '  - %s\n' "${missing_vars[@]}" >&2
            exit 1
          fi

      - name: Checkout QuantPlatformKit
        uses: actions/checkout@v6
        with:
          repository: QuantStrategyLab/QuantPlatformKit
          ref: ${{ inputs.qpk_ref }}
          path: quant-platform-kit

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: "3.12"

      - name: Authenticate to Google Cloud
        uses: google-github-actions/auth@v3
        with:
          workload_identity_provider: ${{ env.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ env.GCP_WORKLOAD_IDENTITY_SERVICE_ACCOUNT }}

      - name: Set up gcloud
        uses: google-github-actions/setup-gcloud@v3
        with:
          project_id: ${{ env.GCP_PROJECT_ID }}
          version: ">= 416.0.0"

      - name: Export LongPort credentials
        run: |
          set -euo pipefail

          read_secret_manager_value() {
            local secret_name="$1"
            local error_file
            error_file="$(mktemp)"
            if value="$(gcloud secrets versions access latest --secret="${secret_name}" 2>"${error_file}")"; then
              rm -f "${error_file}"
              printf '%s' "${value}"
              return 0
            fi

            if [ -n "${CLOUD_RUN_REGION:-}" ] && [ -n "${CLOUD_RUN_SERVICE:-}" ]; then
              runtime_service_account="$(
                gcloud run services describe "${CLOUD_RUN_SERVICE}" \
                  --region "${CLOUD_RUN_REGION}" \
                  --format='value(spec.template.spec.serviceAccountName)' 2>/dev/null || true
              )"
              if [ -n "${runtime_service_account}" ] \
                && value="$(gcloud secrets versions access latest \
                  --secret="${secret_name}" \
                  --impersonate-service-account="${runtime_service_account}" 2>"${error_file}")"; then
                rm -f "${error_file}"
                printf '%s' "${value}"
                return 0
              fi
            fi

            cat "${error_file}" >&2
            rm -f "${error_file}"
            return 1
          }

          longport_app_key="${LONGPORT_APP_KEY_VALUE:-}"
          longport_app_secret="${LONGPORT_APP_SECRET_VALUE:-}"
          longport_access_token="${LONGPORT_ACCESS_TOKEN_VALUE:-}"

          if [ -z "${longport_app_key}" ]; then
            longport_app_key="$(read_secret_manager_value "${LONGPORT_APP_KEY_SECRET_NAME}")"
          fi
          if [ -z "${longport_app_secret}" ]; then
            longport_app_secret="$(read_secret_manager_value "${LONGPORT_APP_SECRET_SECRET_NAME}")"
          fi
          if [ -z "${longport_access_token}" ]; then
            longport_access_token="$(read_secret_manager_value "${LONGPORT_SECRET_NAME}")"
          fi

          echo "::add-mask::${longport_app_key}"
          echo "::add-mask::${longport_app_secret}"
          echo "::add-mask::${longport_access_token}"

          {
            echo "LONGPORT_APP_KEY=${longport_app_key}"
            echo "LONGPORT_APP_SECRET=${longport_app_secret}"
            echo "LONGPORT_ACCESS_TOKEN=${longport_access_token}"
          } >> "$GITHUB_ENV"

      - name: Install probe dependencies
        run: |
          set -euo pipefail

          python -m pip install --upgrade pip
          python -m pip install -e quant-platform-kit pytest longport

      - name: Run HK simulated fractional order probe
        env:
          LONGBRIDGE_API_PROBE: "1"
          LONGBRIDGE_API_PROBE_SYMBOL: ${{ inputs.symbol }}
          LONGBRIDGE_API_PROBE_LIMIT_PRICE: ${{ inputs.limit_price }}
        run: |
          set -euo pipefail

          python -m pytest quant-platform-kit/tests/test_longbridge_fractional_order_api_probe.py -q -s
